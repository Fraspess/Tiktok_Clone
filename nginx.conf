events {}

http {

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        ssl_certificate     /etc/letsencrypt/live/tiktok-clone.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tiktok-clone.duckdns.org/privkey.pem;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            resolver 127.0.0.11 valid=30s;
            set $upstream http://api:8080;
            proxy_pass $upstream;  

            proxy_set_header   Host             $host;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout      300s;
            proxy_send_timeout      300s;

	        client_max_body_size 500M;
            proxy_request_buffering off;
        }

        location /hubs/{
            resolver 127.0.0.11 valid=30s;
            set $upstream http://api:8080;
            proxy_pass $upstream;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 3600s; 
            proxy_send_timeout 3600s;
        }

        location /uploads/ {
            alias /usr/share/nginx/uploads/;

             types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }

            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Content-Length 0;
                return 204;
            }

            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store";
                add_header Access-Control-Allow-Origin *;
            }

            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=604800, immutable";
                add_header Access-Control-Allow-Origin *;
            }
        }

        location /images/ {
            alias /usr/share/nginx/images/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}