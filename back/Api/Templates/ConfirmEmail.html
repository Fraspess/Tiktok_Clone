<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #fe2c55;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            color: white;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .body {
            padding: 32px;
            color: #333333;
        }

        .body p {
            font-size: 15px;
            line-height: 1.6;
        }

        .button {
            display: block;
            width: fit-content;
            margin: 24px auto;
            padding: 14px 32px;
            background-color: #fe2c55;
            color: white !important;
            text-decoration: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #999999;
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>TikTok Clone</h1>
    </div>
    <div class="body">
        <p>Привіт! 👋</p>
        <p>Дякуємо за реєстрацію! Щоб завершити створення акаунту, підтвердіть свою електронну пошту, введіть код
            вказаний нижче:</p>

        <h2>{confirmCode}</h2>

        <p>Якщо ви не реєструвалися — просто ігноруйте цей лист.</p>
        <p>Посилання дійсне протягом <strong>30 хвилин</strong>.</p>
    </div>
    <div class="footer">
        <p>© 2026 TikTok Clone. Всі права захищені.</p>
    </div>
</div>
</body>
</html>
